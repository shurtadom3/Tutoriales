<!DOCTYPE html>
<html>
<body>
    <h1>Compra Rápida</h1>
    {% if mensaje_exito %}
        <p style="color: green;">{{ mensaje_exito }}</p>
    {% elif error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <p>Libro: <strong>{{ libro.titulo }}</strong></p>
    <p>Precio Final (IVA): ${{ total }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background: orange;">Comprar Ya</button>
    </form>
</body>
</html>
